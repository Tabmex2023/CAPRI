<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speisekarte</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

/* Kategorie Button */
.accordion {
  background: #222;
  color: white;
  cursor: pointer;
  padding: 15px;
  width: 90%;
  max-width: 500px;
  margin: 10px auto;
  border: none;
  text-align: left;
  font-size: 18px;
  border-radius: 10px;
}

/* Inhalt */
.panel {
  display: none;
  background: #1a1a1a;
  margin: 0 auto 10px;
  padding: 10px;
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
}

/* Einzelne Items */
.item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #333;
}
</style>

</head>

<body>

<h1>📋 Speisekarte</h1>

<!-- 🍕 Pizza -->
<button class="accordion">🍕 Pizza</button>
<div class="panel">
  <div class="item">
    <span>Pizza Margherita</span>
    <span>6,50€</span>
  </div>
  <div class="item">
    <span>Pizza Salami</span>
    <span>8,50€</span>
  </div>
</div>

<!-- 🥙 Döner -->
<button class="accordion">🥙 Döner & Kebab</button>
<div class="panel">
  <div class="item">
    <span>Döner Tasche</span>
    <span>6,00€</span>
  </div>
</div>

<script>
var acc = document.getElementsByClassName("accordion");

for (let i = 0; i < acc.length; i++) {
  acc[i].onclick = function() {
    this.classList.toggle("active");
    var panel = this.nextElementSibling;
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  };
}
</script>

</body>
</html>
