<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capri Pizza & Grill</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* 🔥 Background Layer */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("https://i.postimg.cc/wjzgLbSQ/IMG-8683.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;

  filter: blur(6px) brightness(0.5);
  z-index: -2;
}

/* 🔥 Overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* 🔥 Content Container */
.container {
  max-width: 500px;
  margin: 40px auto;
  padding: 25px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
}

/* Logo */
.logo {
  width: 120px;
  border-radius: 50%;
  margin-bottom: 10px;
}

/* Titel */
h1 {
  margin: 10px 0;
  font-size: 24px;
}

p {
  font-size: 14px;
}

/* Buttons */
.button {
  display: block;
  margin: 12px auto;
  padding: 15px;
  width: 100%;
  max-width: 320px;
  background: #e63946;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
}

/* Map */
.map {
  margin-top: 20px;
  border-radius: 12px;
  overflow: hidden;
}

/* 🔥 Sticky WhatsApp Button */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Desktop */
@media (min-width: 768px) {
  .container {
    margin-top: 80px;
  }

  h1 {
    font-size: 28px;
  }

  .logo {
    width: 150px;
  }
}
</style>

</head>

<body>

<!-- 🔥 Background -->
<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<img src="https://i.postimg.cc/wjzgLbSQ/IMG-8683.jpg" class="logo">

<h1>🍕 Capri Pizza & Grill</h1>
<p>Bahnhofstraße 83<br>48488 Emsbüren</p>

<a class="button" href="menu.html">📋 Speisekarte ansehen</a>

<a class="button" href="tel:+4959031399">📞 Jetzt anrufen</a>

<a class="button" href="https://wa.me/49123456789">💬 WhatsApp bestellen</a>

<div class="map">
<iframe 
  src="https://www.google.com/maps?q=Bahnhofstraße+83,+48488+Emsbüren&output=embed"
  width="100%" 
  height="250" 
  style="border:0;">
</iframe>
</div>

</div>

<!-- 🔥 Floating WhatsApp -->
<a href="https://wa.me/49123456789" class="whatsapp">💬</a>

</body>
</html>
